name: Feature request
description: Idea for something the plugin should do
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that the plugin doesn't let you do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would the feature look like?
      description: Describe the behavior you'd want. Screenshots / mockups welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds you've tried (optional)
